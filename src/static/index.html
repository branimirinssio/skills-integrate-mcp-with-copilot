<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Mergington High School</h1>
      <h2>Extracurricular Activities</h2>
      <button id="user-icon-btn" class="user-icon-btn" title="Teacher login">&#128100;</button>
    </header>

    <!-- Login modal -->
    <div id="login-modal" class="modal-overlay hidden">
      <div class="modal">
        <h3 id="modal-title">Teacher Login</h3>
        <form id="login-form">
          <div class="form-group">
            <label for="username">Username:</label>
            <input type="text" id="username" required autocomplete="username" placeholder="Username" />
          </div>
          <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" required autocomplete="current-password" placeholder="Password" />
          </div>
          <div id="login-error" class="error hidden"></div>
          <div class="modal-actions">
            <button type="submit" id="login-submit-btn">Login</button>
            <button type="button" id="modal-cancel-btn">Cancel</button>
          </div>
        </form>
        <div id="logged-in-panel" class="hidden">
          <p>Logged in as <strong id="logged-in-username"></strong></p>
          <button type="button" id="logout-btn">Logout</button>
          <button type="button" id="modal-close-btn">Close</button>
        </div>
      </div>
    </div>

    <main>
      <section id="activities-container">
        <h3>Available Activities</h3>
        <div id="activities-list">
          <!-- Activities will be loaded here -->
          <p>Loading activities...</p>
        </div>
      </section>

      <section id="signup-container">
        <h3>Sign Up for an Activity</h3>
        <form id="signup-form">
          <div class="form-group">
            <label for="email">Student Email:</label>
            <input type="email" id="email" required placeholder="your-email@mergington.edu" />
          </div>
          <div class="form-group">
            <label for="activity">Select Activity:</label>
            <select id="activity" required>
              <option value="">-- Select an activity --</option>
              <!-- Activity options will be loaded here -->
            </select>
          </div>
          <button type="submit">Sign Up</button>
        </form>
        <div id="message" class="hidden"></div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Mergington High School</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
